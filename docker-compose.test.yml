# docker-compose.test.yml
services:
  postgres-test:
    image: postgres:16-alpine
    container_name: epiccakes-test-db
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: epiccakes_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d epiccakes_test"]
      interval: 5s
      timeout: 2s
      retries: 10